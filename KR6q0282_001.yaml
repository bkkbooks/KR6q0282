body:
  text: 東京天寧萬壽禪寺長靈卓和尚語録住武林顯寧永報禪寺嗣法介諶編師初住舒州甘露禪院開堂日拈香祝聖壽罷復拈香云此一瓣香氣息也無多子且能上透三世諸佛腦門下徹一切含靈妙本群魔欲隱彌露千眼要見無由今朝拈出已落化儀既有夤緣不無宣布爇向爐中供養洪州黃龍山昭默堂靈源和尚以酬法乳遂敷座上首白槌罷僧問竺乾心印靈源深處傳來祕藏摩尼甘露臺前拈出為國開堂願聞法要師云一人傳虗萬人傳實進云長將日月為天眼共指山河作壽基師云一雨才沾足四民心已蘇僧問保壽開堂三聖推出一僧未審意旨如何師云罕逢穿耳客多遇刻舟人進云為什麼瞎却鎮州一城人眼師云進前不如退後師復云有問有答須是其人若是其人喚作遊戲三昧逢場施設無可不可其或心源尚翳覺照猶蒙但縱狂機無有是處若據此事人天未集已前平常動靜之際人人分上本自混然各無增損明來暗去自古自今一段靈光法爾瑩徹即心即佛日用堂堂非佛非心物物覿體是箇微妙大解脫門於斯得入亡言而聲應十方不動而身遊沙界塵塵華藏境處處總持門即想念以契神機闢塵勞而興佛事回途石馬火裏蓮開以至棒頭取證喝下傳心一指明宗三拜得髓復何怪哉還信得及麼以拂子擊禪牀云若向這裏信得及如許多葛藤又向什麼處去也良久云目前得旨俱成見觸處無心是到頭上堂云年來乍住甘露癡鈍無可作做剛被王官差排業緣無能回互祇得逐浪隨波從教諸方流布門前旋買新鹽甕裏有些陳醋來者覔茶與茶大似雖貧而富更問祖師西來老也得住且住上堂云無邊剎境自他不隔於毫端古人祇道庭前柏樹子自有人省得此事十世古今始終不離於當念便恁麼去誰敢壓良為賤諸仁者如何以摩尼之珠久埋暗室又不可妄認五色便為摩尼致使緇素不分情塵莫脫是知水未入海不得鹹味金不去砂祇成混雜且道摩尼珠即今在什麼處良久云參堂喫茶去上堂云四維風景寥寥極目晴空廓落孰為好醜是非何用識情卜度石火迸光清秋一鶚言前得旨已周遮句後無蹤徒摸𢱢劄著不行秦時𨍏轢上堂云久雨不晴今日晴和泥合水要分明虗空濕了何妨事依舊太陽東畔生可謂簷前滴瀝無非圓通廣大之門春令秋行盡是遮那清淨境界眼見耳聞失錢遭罪汝等諸人還道得藏身句也未良久云饒人不是弱漢上堂僧問無邊剎境自他不隔於毫端因什麼道庵內人不見庵外事師云庵內問將來庵外問將來進云今日小出大遇師云大衆笑你問如何是法王印師云東西南北進云學人未曉更請端的師云且看令行時問奔流度刃疾焰過風合具什麼手腳師云劄進云恁麼則進前不如退後師云近火先焦問丹霞燒木佛院主因什麼眉鬚落師云花貓兒會上樹進云早知如是終不如是師云惜取眉毛問德山入門便棒臨濟入門便喝未審和尚如何為人師云官不容針進云豈無方便師云私通車馬上堂舉僧問崇慧禪師云達磨未來此土時還有佛法也無慧云未來且置而今事作麼生僧云不會慧云萬古長空一朝風月良久又云會麼自己分上事干他來與不來作麼他家來大似賣卜漢相似見汝不會為汝錐破卦兆才生吉凶在汝分上一切自看僧又問如何是解卜底人慧云才出門時便不中也師云崇慧禪師如鐘在架扣之則鳴善則善矣及乎斷卦要且未能端的祇如未出門時是凶是吉大衆孫賓開鋪也汝等諸人亡羊多岐一夜東西尋覔不得何不出來卜一卜看良久云若無孫賓自卜去也擲下拂子云赤腳人趂兔著靴人喫肉上堂云日出卯閙炒炒於其中須善巧還會麼打麵還他州土麥唱歌須是帝鄉人上堂云的的無來去明明有舊新去年今日事今日去年人脫體全收放隨流混主賓春光重漏泄有口不須陳上堂云步步登高從空放下南北東西曾無縫罅教外別傳一切話霸上堂云一切衆生於無生中妄見生滅是故説名輪轉生死甘露道聲聞斷煩惱障證人空理是故説名沉寂滅地菩薩了法無我而起大悲是故説名覺有情者衲僧家飢來喫飯困即打眠且道合具什麼眼上堂云風非別涼火是本熱冷坐九年元來未瞥上堂云平高就下勾賊破家截鐵斬釘狐狸戀窟總不與麼合作麼生所以道萬仞崖頭親撒手須是其人祇如香積國中持鉢一句作麼生道良久云切忌風吹別調中上堂拈起拄杖云大衆若拈起也要汝諸人向普賢門中覔箇出身之處復放下云若放下也教你諸人向文殊門中討箇入頭底路若不拈不放也令汝諸人於毗盧界中不出不入得大自在雖然如是未是好心爭如汝諸人罷却從前流浪識取祖父契書承認本家田業從教露柱懷胎鐵牛生犢後四前三全無窠窟向下文長一喝一咄卓拄杖下座上堂云飛金烏走玉兔剎那之間成新故一陽復處透全身露柱開花還峭措炒茅栗煮山芋衲僧活計隨時做胡家曲拍自分明運推移何處去堪嗟茫茫塵世人幾箇暫行休歇路今年不見去年人多少今人成古墓張三李四醉昏昏笑殺甘露拄杖子上堂云勸公一識取心王萬事畢六塵堆裏拾得來歷劫元來未曾失師云大小傅大士失却了也何故曾經大海休誇水除却梁園總是村上堂云釋迦掩室過犯彌天維摩杜詞自救不了如何如何口門太小上堂僧問如何是衲衣下事師云天旱為民愁問如何是禪師云胡風一扇漢地成機問六般神用空不空一顆圓光色非色如何是一顆圓光師云錦鱗不出水如何是六般神用師云靈禽豈宿巢問如何是主中賓師云不許夜行投明須到如何是賓中主師云長安雖樂不如舊居如何是賓中賓師云人無遠慮必有近憂如何是主中主師云當斷便斷不招其亂僧禮拜師竪起拂子云賓主歷然便下座上堂云甘露尋常説佛説祖是招呼你談玄説妙是蹊徑你行棒行喝是定動你收來放去是殺活你主賓互換是博詰你拈頭作尾是變通你敲骨打髓是諦當你把臂並行是和合你灑灑無事是停息你且道甘露為人在什麼處良久云斫却月中桂清光應更多上堂云付法傳心將錯就錯立雪斷臂隨邪逐惡本色衲僧如何評溥達磨大師露出一膊上堂卓拄杖云從前佛佛祖祖祇説這箇法便下座上堂云一雨一晴嵓桂加青釋迦骨髓彌勒眼睛途中無限拖泥者問渠何日是歸程上堂云黃河水出崑崙要得分明轉見昏若欲迥超無間業滅却如來正法輪卓拄杖下座上堂以拄杖一劃云雲門大師道微塵諸佛總在這裏還辨得盡麼甘露向你道直饒辨得倜儻分明猶被拄杖子礙在更能轉得一任朝到西天暮歸震旦若轉未得殿前燒香殿後合掌擊禪床下座上堂云如龜藏六謾自縮頭似兔分三未為通變有一般底便道可行則行可止則止大似俗氣未除直饒有天曉不露底去處翻前作後底威權向他道莫費力總不恁麼畢竟如何良久云九十春光瞥爾過三千劒客惠然來上堂云空中呈鳥迹水上露燈毬要辨渠端的玉人騎鐵牛所以道放去則途中受用收來則袖裏藏鋒不收不放鼻孔大頭依然向下上堂云虗明自然不勞心力依此修行決入無間地獄非思量處識情難測雖較些子爭奈形凹則影曲殊不知有未形已形之號令已了未了底公案撞著明眼衲僧且要大家判斷畢竟如何良久云德山棒頭猶自可臨濟喝時驚殺人上堂云當斷便斷不招其亂更問如何兩重公案便下座上堂舉僧問雲門樹雕葉落時如何門云體露金風諸禪德還會麼乃云因行不妨掉臂求他不妨求己面前山子若存處處無風浪起一聲鴻鴈忽聞時盡在愁人窠窟裏上堂云過去諸如來斯門已成就以拄杖劃云不消一劃現在諸菩薩今各入圓明放過即不可未來修學人切忌無事生事有般漢見人恁麼説話便道總由和尚殊不知鵝王擇乳素非鴨類上堂舉瑞鹿先和尚示衆云幽林鳥呌碧澗魚跳雲片展張瀑聲嗚咽汝還信得如許多境象示汝箇入處麼若也信得不妨參取好師云是即是大似孟薑女送寒衣相似甘露所以向你道孤村黃葉落深院桂花香志士惜日短愁人知夜長上堂僧問自從認得曹溪路了知生死不相關如何是曹溪路師云十里雙牌五里單堠僧禮拜師云識得路頭也未問如何是前照後用師云花須連夜發莫待曉風吹如何是前用後照師云不因一事難長一智如何是照用同時師云苦瓠連根苦甜瓜徹蒂甜如何是照用不同時師云左眼半白右眼半黑上堂云風從何來雨從何至皮下有血面上有鼻脫體相呈全無忌諱明眼衲僧更須瞥地瞥地如何且莫瞌睡上堂云實證者尚不見證何況非證何也非情量所證智乃能證而此智證無證無不證有般漢聞恁麼説話不知落處便道衲僧家如箇座主相似不免隨其顛倒所欲向他道臂長衫袖短腳瘦草鞋寬以拂子擊禪床下座上堂云晴煙淡淡暖日遲遲百鳥歌而山谷鳴千花笑而蜂蝶亂於斯明得不動步到觀音普門平地上入文殊智海悲智融會寂用俱收直能如是向衲僧門下粗可從容打辨若不然者心隨境變志逐事遷虗擲光陰猶自可竛竮辛苦更愁人上堂云落花隨流水啼鳥在深雲莫怪多違背年高耳目昏豈不見七百甲子老禪翁對人祇道東門西門南門北門上堂云披砂揀金非我族類拈來便用罕遇其人不見道不許夜行投明須到若是醋蟲不知酸明鑑不自照也祇是坎井之蛙詎知滄海譬如畫虎未成猶勝於犬萬仞崖頭曾撒手底但請丹霄獨步上堂云昨朝炒炒閙今朝閙炒炒波斯失白㲲拾得鐵錢鈔還知麼會須有用著時節上堂拈起拄杖云這一隊瞌睡漢還知汝諸人眼睛盡在山僧手裏也無良久擲下拄杖云還汝眼睛一任醒醒次住廬州能仁資福禪院上堂僧問佛未出世時如何師云絶毫絶釐進云出世後如何師云填溝塞壑進云出與未出相去幾何師云人平不語水平不流師乃云大凡普會衆前出來鼓揚此事也須是本分衲僧方乃函蓋相投當機勦絶才有聱訛便為離隔而況機輪轉處佛眼猶迷祖令行時凡情那測故德山棒下知輕重者開竅俱通臨濟喝中辨主賓者皮膚脫落如王寶劒孰敢當鋒所以道言之者失其真知之者反其愚有之者乖其性無之者傷其軀病既多途藥還異狀若不深窮閫奧直造根元水乳何分精粗莫辨致使廣大威德枉受驅馳本智不生識情為咎當須明悟理則昭然上堂云了法非法則法法真如知心非心則心心玄寂玄寂則應用恆沙真如則隱顯無間既是隱顯作麼生無間良久云早知燈是火飯熟也多時上堂舉城東老母與佛同時而生一世共處而不欲見佛每見佛來即便回避周回上下皆避不及乃以手掩面十指掌中悉皆見佛師云釋迦老人一等慈悲方便也甚奇怪雖然如是畢竟還為得伊也無要會麼既無回避處合掌見尊顏一香兼一火恭敬又何難也不難空王殿裏自家看上堂云心心心佛佛佛心佛佛心心心佛佛心佛無二更須知有向上一竅如何是向上一竅復云南瞻部州北單越上堂云摩尼在掌隨五色以分輝寶月當空散千江而現影還會麼以拄杖一劃云禍不入慎家之門上堂云見見須教透頂門頂門開處寶光分照徹古今無比況猶來佛祖是兒孫何故如此到頭珠有水未免線因針上堂云真不掩偽開眼瞌睡曲不藏直猶較些子魚目明珠都盧在汝更擬如何未敢相許上堂舉荊南大將送供上雲居問膺和尚云如來有密語迦葉不覆藏未審意旨如何膺喚尚書尚書應喏膺云還會麼尚書云不會膺云尚書若不會如來有密語尚書若會迦葉不覆藏師云也甚奇怪一等是恁麼事要須恁麼人還知道如來密語一時被雲居漏泄了麼更若未會但且看風使帆因行掉臂上堂云人無心合道困來不覺和衣倒一老一不老法身真箇入荒草了無來隨分討糞掃堆頭拾得寶木人石女共歡呼信手拈來用恰好青山無盡意無窮何須更覔來時道上堂云二月桃花紅三月李花白要調滿庭芳須會十八拍所以雲門大師以拄杖擊繩床云一切聲是佛聲一切色是佛色你把鉢盂噇飯時有箇鉢盂見行時有箇行見坐時有箇坐見這般底恁麼去就把棒一時趂散師遂以拄杖擊禪床云而今一切聲是聲一切色是色是汝諸人把鉢盂噇飯但作鉢盂見行時但作行見坐時但作坐見忽若撞著雲門復擊禪床云蘇嚕蘇嚕上堂云開眼即迷閉眼即錯古佛巴鼻何處摸索竪起拂子云大衆復云錯上堂云雷音堂上久無隱隱之聲可謂與諸人曠然隔闊長靈室內亘古如然可謂與諸人鎮長參會既已隔闊又常參會未了之人如何不疑而今若能於兩頭三首處豁見本來乃知老僧不昧闍梨如或露柱依前是木頭﨟月三十日一場懡㦬上堂云會與不會拈却一對直截如何風不鳴條雨不破塊以拂子擊禪床云參上堂僧問如何是體中玄師云佛眼覷不見進云如何是句中玄師云拈來特地新進云如何是玄中玄師云蚌含明月問自從一喫馬師踏直至而今笑未休未審笑箇什麼師竪起拂子云無量法門百千妙義進云坐斷報化佛歌揚自己風師云棒打石人開鐵眼劒揮牛斗動金星問言語道斷心行處滅正當恁麼時憑誰舉似師云人無遠慮必有近憂進云恁麼則一言吞萬像千古播徽猷師云車不橫推問雲舒野外雨滴簷前如何明得點點不落別處師云透過圓通門聞聞不在耳進云正在當人眼裏鳴也師云不妨惺惺上堂云欲明生死須窮道一葉落時天下秋不涉去來常變化歸根得旨但隨流且道歸根一句作麼生道上堂云晴來又雨雨了又晴輝天電閃震地雷鳴爭奈室中人不聞何大衆祇如室中人還具六根也無試向這裏斷看上堂云古佛真宗彌滿成現明眼衲僧作麼生辨良久云切忌撞頭磕腦以拂子擊禪床下座上堂云糞掃堆頭丈六身入泥入水出家人丈夫自有通方眼認著珍時不是珍上堂云得之於心般若如清涼池四面皆可入失之強從教倔強殊不知有箇人不使十二時亦不被十二時使全本全末全去全來汝等諸人作麼生辨要知麼自携瓶去沽村酒却著衫來作主人上堂舉永嘉道一月普現一切水一切水月一月攝諸佛法身入我性我性恆共如來合永嘉大師老婆禪不妨赤心片片殊不知燈籠露柱與釋迦老人分憂蝦蟆蛤蚾為達磨大師雪屈且道雪得雪不得汝等諸人還瞥不瞥天寧三門杜口有分佛殿上鵄吻尾豝已折上堂云歲時駒過隙倐忽十月初今年寒較早前日已開爐爐邊向去者各各護眉鬚分明一路無寒暑不知何日是歸歟上堂僧問承師有言分明一路無寒暑未審路頭在什麼處師云幾度欲歸歸不得門前依舊草芊芊僧云便向者裏歸得未審如何行李師云急行無好步僧云爭奈千峯勢到嶽邊盡萬派聲歸海上消師云道得分明出轉難問爐華烏薪叢林規則火中三昧如何指南師云性火真空無間斷團圝頭處且隨時僧云如是則紅焰皆真諦頭頭趣不虧師云溈山問仰山問如何是玄中玄師云匹上不足匹下有餘僧云如何是體中玄師云半夜失烏雞僧云如何是句中玄師云信手拈來無異草僧云三玄已蒙師指示祖師心印願敷揚師云天共白雲曉水和明月流上堂云乾坤之內宇宙之間中有一寶乃唱云在什麼處良久云若要價重娑婆但識取這箇擲拂子下座上堂拈拄杖橫按云釋迦先鋒彌勒後殿且道中軍主將畢竟是誰良久云擬議之間西天此土卓一下下座上堂云日出心光耀堂堂更孤峭天陰性地昏風寒早閉門不知天地者剛道有乾坤欲明還得暗打破却渾侖爭如回首家鄉路寒食依前是暮春上堂舉雪峯指火爐謂玄沙云三世諸佛盡在裏許轉大法輪沙云近日王令稍嚴峯云作麼生沙云不許人攙奪行市後來雲門舉此語乃云火爐為三世諸佛説法三世諸佛立地聽天寧向你道火爐是三世諸佛祖父三世諸佛是渠兒孫汝等諸人切不得觸著祖父諱若也觸著便見髑髏遍野上堂云寶鑑當臺物來則現像自起滅鑑無來去影有千差光無二相然影非自影由像而形光不自光因鑑而顯鑑光影像不異不同直下知歸盡屬當人受用天寧話麼説話大似開眼尿床三十年後有甚雪處上堂云心同虗空界箇中有買賣示等虗空法處處皆周匝證得虗空時全收復是誰無是無非法一離還一合汝等諸人還知落處麼良久云不因霜雪苦那辨歲寒心上堂云漭漭蕩蕩道無事底兩手分付不肯要學言學語沒地頭底流浪救不得所以尋常都不敢動著且祇得因行不妨掉臂教他長者自長短者自短上堂云三千劒客獨許莊周為什麼跳不出良醫之門病人益甚因什麼不消一劄已過關者更請辨看上堂云雲從龍風從虎大地誰言無寸土三陽肇處布新春明明獨露乾坤祖誰知毗耶老病翁默爾忘言善談吐不落四句徹三玄還他一二三四五報爾栴檀林下人應時納祐還知否收來橫骨暗中抽放去隨群作水牯良久召大衆云頭角生也牢把鼻孔以拂子擊禪床下座上堂云諸佛不出世四十九年説説又説箇甚麼良久云千江有水千江月萬里無雲萬里天祖師不西來少林有妙訣妙訣是什麼熱碗鳴復云西天此土俱拈却一種平懷當處親若人識祖佛當處便超越若是祖佛又作麼生識如何便超越良久云大盡三十日小盡二十九上堂云會萬物為自己者其惟聖人乎祇如而今山河大地縱目所觀莫非是物且作麼生會得成自己去若言山是山水是水長者長短者短正是物不為會若言攬真成立色相無礙也是物不為會若言千波競起盡是文殊家風亦是物不為會不然道是則一切是非則一切非不勞拈出靈利漢這裏著得一隻眼便見匝地清風虎頭生角上堂云譬如眼根不自見眼性自平等無平等者便恁麼去無孔鐵槌聊且安置直得入林不動草入水不動波也祇是一期之故若也籬內竹抽籬外笋澗東花發澗西紅更待勘過了打上堂云還見麼巍巍實相逼塞虗空咄是什麼語話便具爍迦羅眼到這裏也用不著且道衲僧尋常用什麼眼上堂云生死即涅槃涅槃即生死全迷即全悟全死即全生魔佛齊平孰為非道又須知生死非涅槃涅槃非生死無生死而不顯涅槃無涅槃而不度生死法法顯然塵塵自離到者裏更須有轉身一路若也轉得枯木枝頭別迎春色踢倒鐵圍山踏翻生死海從教月色和雲白管取春來草又青上堂云一月普現一切水一燈能傳百千燈舉拂子云還見麼此時不徹全身句眨起眉毛已葛藤上堂云大圓鑑中同結社一微塵裏共安居釋迦彌勒無門入不到到者真丈夫大丈夫漢撩著便知來由不為分外若更擬議躊躇何啻雲泥萬里所以道十五日已前點即不到十五日已後到即不點且道點即是不點即是良久云長因虎嘯風生處記得龍吟霧起時上堂云五五二十五人人超佛祖撩著未知機黃金成糞土諸禪德莫莾鹵夷門山朝朝走入新羅占波國裏賣吉州針相逢醉老婆尋牛撞著虎上堂舉雪峯一日參次一僧出來不審珍重便歸衆峯云總似這漢省多少力玄沙云恁麼為人瞎却福州一城人眼在峯云子又如何沙云好與二十棒峯云已後無人奈子何師云二十棒為復是那僧喫雪峯喫玄沙自喫試請斷看要知麼白璧何足多黃金未是苦上堂云逢庚則伏貍奴昨外暍死遇明則蘇白牯今朝律活全活全死全死全活死活兩忘是箇什麼到這裏也須是箇漢始得參學眼目宜各打辨精彩上堂云長期告畢法歲云周木人施草石女行籌衲僧了無交涉那更頭上安頭橫擔楖𣗖笑傲清秋要去即去得留且留逢人若問長靈老向道浩浩塵中鬪鐵牛上堂僧問圓音堂上已焚海岸之香師子座前願聽無生之曲師云不是薰風與流水却隨流水到人間進云希聲迥出簫韶外無限旁人側耳聽師云眼處聞時方得知問有問有答猶涉程途無問無答音信難通如何直得截歸源去師云彈指若知霄漢路便能平地起煙雲僧云恁麼則全身歸問答元不犯絲毫師云萬像齊相印虗空笑點頭上堂云過現無三世星霜有四明秋殘心似口冬至眼如眉了了何依住新新孰變移歲寒同飲冷暖自家知上堂云心心心莫謾尋道道道已蹉過不蹉過是什麼一機全步步到木馬已追風瞎驢倒推磨上堂云天寧不可不為你舉話也遂拈拄杖敲禪床復擲下云心不負人面無慚色下座上堂舉僧問趙州學人乍入叢林乞師指示州云喫粥了未僧云喫粥了也州云洗鉢盂去其僧遂有省師云汝等諸人早來人人喫粥各各洗鉢盂趙州恁麼道這僧恁麼省還會得也未忽有箇衲僧出來道長因送客處記得別家時天寧向伊道易開終始口難保歲寒心師宣和六年十二月二十七日圓寂先於二十五日上堂舉僧問雲門如何是雲門一曲門云臘月二十五師云雲門曲子不妨徑直便恁麼會得去﨟月三十日贏得觜頭光若也不會﨟月三十日亦贏得觜頭光汝等諸人畢竟作麼生會老僧住世能復幾時若是據令而行直須法堂上草深一丈而今不獲已將烏缸打作硯瓦賣曲盡老婆心為汝諸人和箇小曲子乃云衲僧要唱雲門曲六六從來三十六曹源有箇癡禪人解道一生數不足數不足不屬金石與絲竹等間一拍五音全直道如弦已曲彔從教歲去年來依舊山青水緑垂語百則又曰室中百問五行未兆已前有箇人鼻孔撩天及乎爻象才分為什麼却隨群逐隊師答石壓笋斜出崖懸花倒生瓦礫與黃金一色辨者猶難上智與下愚同波通人自鑒道道和尚已道了也機輪轉處佛眼猶迷如何是一鏃破三關底句子已過新羅國言中有響作者應知為什麼却分踈不下如人飲水冷暖自知欲識佛性義當須行異類古人為什麼目視雲漢塵塵共放白毫光會禪即為禪縛學佛即被佛魔如何是脫灑底句鼻孔大頭向下垂打破畫瓶猶可易明分偏正何似生判官手裡筆天不能蓋地不能載衲僧拄杖從何而得推倒禪床舉一明三人人知有點著不來雲泥有隔當鋒一句作麼生道和尚萬福明眼漢沒窠臼我且問你鼻孔因什麼大頭向下黃河向北流注瓦者巧注金者昏衲僧門下過在什麼處出頭天外看空劫已前強生節目融通日用過犯彌天坐斷舌頭速道速道竪起拳頭恍恍惚惚此物非物即且置眉頭八字分開為什麼當堂蹉過看腳下便獲蓮華捧足何似困即打眠太快活生水中鹹味色裏膠青箇箇道我會荊棘林過不得病在什麼處喝前佛也恁麼後佛也恁麼須彌山穿過毗盧藏大海水流入普賢眼直須悟去好謝和尚指示面赤不如語直且從你竪起拳云這箇喚作什麼漏逗不少若人識得心大地無寸土修山主出頭不得為什麼不向七穿八穴處相見恁麼恁麼五音令人耳聾平地上死人無數玄沙道底寧無一箇半箇那啻一箇半箇千箇萬箇也有雞寒上樹鴨寒下水是你尋常用底還識得也未頭上安頭作麼得人一牛還人一馬明眼衲僧因什麼話墮兼身在內滿口道無處説我共你平展相見道將一句來和尚要喫茶麼遇賤則貴你作麼生辨須知有不犯宮商底句燈籠沿壁上天台分外則不可我也知你親明眼人落井作麼生舉竹密不妨流水過尋常道生死無變動靜有常還透得也未眼光落地如何駕途正與麼時向和尚道佛法不用學學得轉成魔向鉢盂處會取好討甚麼碗佛法須用學觸處生光輝叉手一句試道看露柱懷胎生石兒更深夜靜無人處作麼生與伊商量又被燈籠呵呵笑菩薩觀色即是見空觀空莫非見色衲僧家總不動著尋常開眼見箇什麼脫殼烏龜飛上