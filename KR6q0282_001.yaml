佛二菩薩撞著老維摩輕輕共伊説施者非福田是誰納敗闕咦本覺本來明乘緣須體妙壁立何匹儔漚和生談笑萬化了全機千機全一照波昏月豈亡水清光自曜林下既了空塵中須達事隨事了真空自空展化事事空空事中淘鎔成寶器寶器盛醍醐是曰甘露味食施何如法施均緑楊青草幾番春擎盂好好中去莫惜眉毛指向人座右銘覺變則迷識澄則悟作止因依生死交㸦妙矣靈通混然本素用與性齊語與默寓三世現前十方頓赴非知而知不住而住永言大觀唯心是務止堂銘太原子淵居士名其堂曰止志求自得之安而謂長靈野人云余所居止堂非流止之止若以止止其流是止亦流也止有所止則昧乎淵源皆不出形待之間今所謂止者即觀之止止與觀俱則忘止矣忘止之止語默動靜無非止也乃所以成吾真止長靈野人答之曰道之妙斯言得之矣必期有以如實造證則無以加焉因為之銘曰旨哉斯堂全觀全止是止亦止應現何已法爾而然不默則病必爾之歸淵默生定妙定圓極心精發光不出戶牖靈鑒十方既超動靜無住者存居之而安左右逢原行狀和尚諱守卓生莊氏泉南人也弱冠遊京師肄業天清寺試大經得度遊學至三衢見南禪清雅禪師一日以所得白雅雅即印可之師心易之舍去抵姑蘇定慧從遵式禪師通華嚴遂臻其奧式敬異之時靈源清禪師住龍舒太平道鳴四方因往依焉始至聞夜參適中其病遂猛省曰此真吾師也投誠入室靈源為開大爐韛鍛以差別機智師皆酬酢無爽且戒其緘默無自衒師領厥旨陸沉衆中不渝節不苟狎人罔知者皆以為倔強靈源遷住黃龍師隨侍十載一日辭去靈源送以偈其字略曰居無二志動必全心遂越化城以登寶所而卷舌冥懷不事談耀故其所到人或罕知豫獨觀其無今時學輩短販近圖之患謂可以步修途而加鞭絶纖意於百年也此皆師之實録既而復造太平佛鑑勤禪師請居第一座師以勤為知己不固辭衆皆疑駭及聞説示罔不欽服太守孫公傑聞其名偶以甘露闕人請師主之勤與衆咸以荒村破院欲其無行師曰政不以此為慮顧在我者如何耳腰包而往衲子歸之各以巾槖長餘增修堂室舒民素號難化至是亦翕然信向樂於不斁竟化草菜為寶坊也或曰剛強受化何道致之耶曰吾豈暇家至戶到而化之耶然吾佛祖兒孫但不乏吾事莫知其所以然而然也或者賞嘆其言之異開堂後靈源覩書則曰吾之責可付而積翠之風可追矣遂以拂子表法信示偈曰即此用離此用一鏃離弦墮喝中紅心心裏中紅心發我江西大機用付爾宜將振祖風荷擔勿憚千鈞重鍛聖鎔凡善放收會應不與諸方共又曰世稱承紹者多名存而實亡豫於此時法爾不能忘有望於汝汝亦能不法爾所慮哉又曰執善應之樞處會通之要理須遵古事貴適時委靡結他緣孤標全己任是必自勉不待吾言也次遷廬之資福京之天寧皆法席久廢處未幾則嚮合如甘露平生刻苦用度儉約凡所住處齋粥僅粒嘗謂衆曰靈源囑豫當易衆人之所難緩時流之所急豫終身佩之不敢忘凡臨衆必以身率之不立規矩而繩繩自化面目嚴冷諸方色目之曰卓鐵面初移太平長靈室衲子因以長靈稱之宣和五年十二月二十五日上堂和雲門臘月一曲因激切勸戒學者至二十七日辭衆安坐而化閲世五十有九坐三十有二夏後五日闍維不壞者三所雨舍利五色晶瑩道俗獲者不可勝數塔于京師法雲圓通禪師塔之右六年正月二十一日也紹興十四年正月十五日門人介諶謹狀附記普燈録第十卷曰長靈守卓禪師云云宣和五年十二月二十七奄然示寂闍維日皇帝遣中使賜香持金盤求設利爇香罷盤中鏗然視之五色者數顆大如豆使者馳還上見大悅而京城傳為盛事
